id: 058e790c-7139-4857-b245-a9f6c70c1bfb
name: "[DET] RBAC role assignment changes"
description: |
  An Azure RBAC role assignment was created or removed by a principal that is not a known
  automation/PIM identity. Granting a role is a primary privilege-escalation and persistence
  mechanism; routine grants come from automation and PIM, so v2 suppresses those (soc-automation
  -principals watchlist) and surfaces ad-hoc grants by users or unexpected principals for review.
  NOTE: AzureActivity does not carry the role definition or target principal for a roleAssignments
  write (verified against the live record), so the rule cannot filter by the role granted; the
  caller allow-list is the fidelity dimension the data actually supports.
severity: Medium
requiredDataConnectors:
  - connectorId: AzureActivity
    dataTypes:
      - AzureActivity
queryFrequency: PT30M
queryPeriod: PT1H
triggerOperator: gt
triggerThreshold: 0
tactics:
  - PrivilegeEscalation
  - Persistence
relevantTechniques:
  - T1098
query: |
  // soc-automation-principals: SearchKey = objectId/UPN of automation + PIM identities whose
  // role assignments are routine. Maintained in the tenant; no identities committed to the repo.
  let automation = _GetWatchlist('soc-automation-principals') | project SearchKey;
  AzureActivity
  | where TimeGenerated > ago(1h)
  | where OperationNameValue has "Microsoft.Authorization/roleAssignments"
  | where ActivityStatusValue == "Success"
  | where Caller !in~ (automation)
  | extend CallerIp = tostring(parse_json(tostring(Properties_d.httpRequest)).clientIpAddress)
  | project TimeGenerated, Caller, CallerIp, OperationNameValue, ResourceId
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: FullName
        columnName: Caller
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: CallerIp
metadata:
  atomic: "T1098.003, Account Manipulation: Additional Cloud Roles (assign Azure role to a principal)."
  requiredFields: [AzureActivity.OperationNameValue, AzureActivity.ActivityStatusValue, AzureActivity.Caller, AzureActivity.Properties_d]
  dataPlane: "AzureActivity control plane; automation allow-list via the soc-automation-principals watchlist."
  falsePositives:
    - "An automation/PIM principal missing from soc-automation-principals; add it to the watchlist."
  severityRationale: "Medium baseline. The role granted is not in the Activity Log, so triage the assignment in the portal to confirm whether a high-privilege role (Owner/Contributor/User Access Administrator) was granted."
  responseAction: "Verify the grant is authorized; for high-privilege roles confirm the caller is an expected admin, otherwise remove the assignment and investigate the caller's recent activity and source IP."
