id: 55f5aaa3-440f-44bd-9d13-03957f714084
name: "[DET] LSASS credential access"
description: |
  LSASS holds cached credentials and is the first target after initial access (Mimikatz,
  comsvcs.dll minidump, procdump, nanodump). This rule fuses the three signals Defender for
  Endpoint actually emits for the technique so it fires whether the dump runs, is blocked at
  the API layer, or is prevented by AMSI / behavioral protection:
    A. a process opens a handle to lsass.exe (api-level, DeviceEvents.OpenProcessApiCall),
    B. a known dump tool runs with lsass on its command line (process-level, DeviceProcessEvents),
    C. Defender prevents an lsass credential-theft hacktool (MDATP alert, SecurityAlert).
  Endpoint counterpart to the AzureActivity control-plane rules, deployed by the same pipeline.
severity: High
requiredDataConnectors:
  - connectorId: MicrosoftThreatProtection
    dataTypes:
      - DeviceEvents
      - DeviceProcessEvents
      - SecurityAlert
queryFrequency: PT15M
queryPeriod: PT1H
triggerOperator: gt
triggerThreshold: 0
tactics:
  - CredentialAccess
relevantTechniques:
  - T1003.001
query: |
  let lookback = 1h;
  let knownGoodReaders = dynamic(["MsMpEng.exe", "MsSense.exe", "SenseIR.exe"]);
  // Signal A - direct handle open to LSASS (api-level: Mimikatz / direct-syscall tooling)
  let openHandle =
      DeviceEvents
      | where TimeGenerated > ago(lookback)
      | where ActionType == "OpenProcessApiCall" and FileName =~ "lsass.exe"
      | where InitiatingProcessFileName !in~ (knownGoodReaders)
      | extend Account = InitiatingProcessAccountName,
               Technique = "Handle open to lsass.exe",
               Evidence = strcat(InitiatingProcessFileName, " -> lsass.exe");
  // Signal B - credential-dump tool with LSASS on the command line (process-level)
  let dumpTool =
      DeviceProcessEvents
      | where TimeGenerated > ago(lookback)
      | where (ProcessCommandLine has "lsass" and ProcessCommandLine has_any ("-ma", "MiniDump", "nanodump", "dumpert", "comsvcs"))
          or (FileName in~ ("procdump.exe", "procdump64.exe") and ProcessCommandLine has "lsass")
      | extend Account = AccountName,
               Technique = "Credential-dump tool vs lsass",
               Evidence = ProcessCommandLine;
  // Signal C - Defender prevented an LSASS credential-theft hacktool (AMSI / behavioral)
  let preventedTool =
      SecurityAlert
      | where TimeGenerated > ago(lookback)
      | where ProviderName == "MDATP"
      | where AlertName has "lsass" or AlertName has_any ("DumpLsass", "Lsassdump")
      | mv-apply Entity = parse_json(Entities) on (
          where Entity.Type == "host"
          | project DeviceName = tostring(Entity.HostName)
          | take 1)
      | extend Account = "",
               Technique = "Defender-prevented lsass hacktool",
               Evidence = AlertName;
  union
    (openHandle    | project TimeGenerated, DeviceName, Account, Technique, Evidence),
    (dumpTool      | project TimeGenerated, DeviceName, Account, Technique, Evidence),
    (preventedTool | project TimeGenerated, DeviceName, Account, Technique, Evidence)
  | summarize Techniques = make_set(Technique), Evidence = make_set(Evidence, 12),
              FirstSeen = min(TimeGenerated), LastSeen = max(TimeGenerated), Signals = count()
      by DeviceName, Account
  | where Signals >= 1
entityMappings:
  - entityType: Host
    fieldMappings:
      - identifier: HostName
        columnName: DeviceName
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: Account
metadata:
  atomic: "T1003.001, OS Credential Dumping: LSASS Memory (procdump / comsvcs.dll minidump / nanodump atomics)."
  requiredFields: [DeviceEvents.ActionType, DeviceEvents.FileName, DeviceProcessEvents.ProcessCommandLine, SecurityAlert.AlertName, SecurityAlert.Entities]
  dataPlane: "Defender for Endpoint Device* telemetry plus MDATP alerts, streamed to sc200-ws via the Defender XDR connector."
  falsePositives:
    - "Backup agents, non-Defender EDR/AV, and management tooling that legitimately read LSASS (Signal A)."
    - "Authorized red-team or detection-validation activity that runs dump tooling (Signals B and C)."
  severityRationale: "Credential theft enables lateral movement and privilege escalation. High on a server that should have near-zero LSASS access. On a hardened host the dump is prevented, but the attempt still indicates an active operator and must be triaged."
  responseAction: "Isolate the device, confirm whether the read succeeded (PPL / Credential Guard state), rotate exposed credentials, and hunt the initial-access vector with the companion endpoint hunts."
