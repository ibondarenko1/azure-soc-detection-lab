id: 55f5aaa3-440f-44bd-9d13-03957f714084
name: "[DET] LSASS credential access"
description: |
  A process opened a handle to lsass.exe, the memory that holds cached credentials and the
  first target after initial access (Mimikatz, comsvcs.dll minidump, procdump). Endpoint
  counterpart to the AzureActivity control-plane rules, deployed by the same pipeline.
severity: High
requiredDataConnectors:
  - connectorId: MicrosoftThreatProtection
    dataTypes:
      - DeviceEvents
queryFrequency: PT15M
queryPeriod: PT1H
triggerOperator: gt
triggerThreshold: 0
tactics:
  - CredentialAccess
relevantTechniques:
  - T1003.001
query: |
  DeviceEvents
  | where TimeGenerated > ago(1h)
  | where ActionType == "OpenProcessApiCall"
  | where FileName =~ "lsass.exe"
  | where InitiatingProcessFileName !in~ ("MsMpEng.exe", "MsSense.exe", "SenseIR.exe")
  | summarize AccessCount = count(), Tools = make_set(InitiatingProcessFileName, 10)
      by DeviceName, InitiatingProcessAccountName, bin(TimeGenerated, 5m)
  | where AccessCount >= 1
entityMappings:
  - entityType: Host
    fieldMappings:
      - identifier: HostName
        columnName: DeviceName
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: InitiatingProcessAccountName
metadata:
  atomic: "T1003.001, OS Credential Dumping: LSASS Memory (procdump / comsvcs.dll minidump atomics)."
  requiredFields: [DeviceEvents.ActionType, DeviceEvents.FileName, DeviceEvents.InitiatingProcessFileName, DeviceEvents.DeviceName, DeviceEvents.InitiatingProcessAccountName]
  dataPlane: "Defender for Endpoint Device* telemetry, streamed to sc200-ws via the Defender XDR connector."
  falsePositives:
    - "Backup agents, non-Defender EDR/AV, and some management tooling that legitimately read LSASS."
  severityRationale: "Credential theft enables lateral movement and privilege escalation. High on a server that should have near-zero LSASS access."
  responseAction: "Isolate the device, collect the dump artifact, rotate exposed credentials, hunt for the initial-access vector with the companion endpoint hunts."
