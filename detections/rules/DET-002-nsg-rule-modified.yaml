id: 41c9799f-00e7-47b8-a2a5-e4f4ee0b4ab4
name: "[DET] Network Security Group rule modified"
description: |
  An NSG security rule was created, modified, or deleted. Loosening an NSG (e.g. opening
  a management port to the internet) is a classic move to weaken network defenses.
severity: Medium
requiredDataConnectors:
  - connectorId: AzureActivity
    dataTypes:
      - AzureActivity
queryFrequency: PT30M
queryPeriod: PT1H
triggerOperator: gt
triggerThreshold: 0
tactics:
  - DefenseEvasion
relevantTechniques:
  - T1562
query: |
  AzureActivity
  | where TimeGenerated > ago(1h)
  | where OperationNameValue has "Microsoft.Network/networkSecurityGroups/securityRules"
  | where ActivityStatusValue == "Success"
  | project TimeGenerated, Caller, OperationNameValue, ResourceId
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: FullName
        columnName: Caller
metadata:
  atomic: "T1562.007, Impair Defenses: Disable or Modify Cloud Firewall (NSG rule modification)."
  requiredFields: [AzureActivity.OperationNameValue, AzureActivity.ActivityStatusValue, AzureActivity.Caller, AzureActivity.ResourceId]
  falsePositives:
    - "Legitimate network change management; IaC applying NSG updates."
  severityRationale: "Any NSG change is review-worthy but not itself harmful, Medium. Escalate to High when the new rule allows a management port (22/3389/5985) from Any/Internet."
  responseAction: "Confirm the change is authorized; if the rule opens a management port to the internet, revert and investigate the caller."
